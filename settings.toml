[code]

[code.editor]
show_project_explorer = true
show_code_review_button = true
show_global_search = true

[appearance]

[appearance.panes]
should_dim_inactive_panes = true

[appearance.cursor]
cursor_display_type = "block"
cursor_blink = "enabled"

[appearance.themes]
theme = {
  custom = {
    name = "y2kdream Forest Light",
    path = 'C:\Users\egois\AppData\Roaming\warp\Warp\data\themes\y2kdreams\warp-term\y2kdreams-forest-light\y2kdream-forest-light.yaml',
  },
}
system_theme = false
selected_system_themes = {
  dark = {
    custom = {
      name = "y2kdream Butter Dark",
      path = 'C:\Users\egois\AppData\Roaming\warp\Warp\data\themes\y2kdreams\warp-term\y2kdream-butter-dark\y2kdream-butter-dark.yaml',
    },
  },
  light = {
    custom = {
      name = "y2kdream Butter Light",
      path = 'C:\Users\egois\AppData\Roaming\warp\Warp\data\themes\y2kdreams\warp-term\y2kdream-butter-light\y2kdream-butter-light.yaml',
    },
  },
}

[appearance.text]
match_ai_font = false
font_name = "Maple Mono NF"
font_size = 16.0
ai_font_name = "SpaceMono Nerd Font Mono"
enforce_minimum_contrast = "always"
font_weight = "bold"
notebook_font_size = 16.0
ligature_rendering_enabled = true
match_notebook_to_monospace_font_size = false

[appearance.window]
zoom_level = 110
override_blur_texture = true
override_opacity = 100
open_windows_at_custom_size = false
left_panel_visibility_across_tabs = true

[appearance.vertical_tabs]
enabled = true
use_latest_prompt_as_title = true
display_granularity = "panes"
primary_info = "command"

[appearance.input]
input_mode = "pinned_to_bottom"

[appearance.blocks]
show_jump_to_bottom_of_block_button = true

[agents]
cloud_conversation_storage_enabled = true

[agents.third_party]
auto_open_composer_on_cli_agent_start = true
should_render_cli_agent_toolbar = true

[agents.third_party.cli_agent_toolbar_chip_selection_setting]

[agents.third_party.cli_agent_toolbar_chip_selection_setting.custom]
left = [
  "file_attach",
  "voice_input",
  { context_chip = "git_diff_stats" },
  "share_session",
  "rich_input",
  "file_explorer",
]
right = [{ context_chip = "working_directory" }, { context_chip = "shell_git_branch" }, "settings"]

