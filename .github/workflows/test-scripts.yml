name: Test Scripts

on:
  push:
    paths:
      - '.scripts/**'
  pull_request:
    paths:
      - '.scripts/**'

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run tests
        run: python .scripts/test.py
